<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线客服</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #eeeeee;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #111;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 630px;
      height: 100vh;
      margin: 0 auto;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      border: 1px solid #dddddd;
    }

    .topbar {
      height: 64px;
      background: #1e88f5;
      color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .back {
      font-size: 40px;
      font-weight: 300;
      margin-right: 10px;
      line-height: 1;
    }

    .icon {
      font-size: 34px;
      margin-right: 12px;
      line-height: 1;
    }

    .top-title {
      font-size: 23px;
      font-weight: 400;
    }

    .chat-main {
      flex: 1;
      background: #ffffff;
      padding: 36px 20px 20px 20px;
      overflow-y: auto;
    }

    .service-info {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      margin-right: 9px;
      font-size: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-size: 18px;
      color: #728196;
      margin-right: 10px;
    }

    .time {
      font-size: 17px;
      color: #7d8aa0;
    }

    .service-message {
      margin-left: 43px;
      width: 390px;
      background: #eeeeee;
      padding: 8px 8px;
      font-size: 21px;
      line-height: 1.45;
      color: #111111;
      white-space: pre-line;
    }

    .user-message {
      display: flex;
      justify-content: flex-end;
      margin: 20px 0;
    }

    .user-bubble {
      background: #1e88f5;
      color: #ffffff;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 20px;
      line-height: 1.4;
      max-width: 72%;
      word-break: break-word;
    }

    .input-panel {
      height: 202px;
      background: #ffffff;
      border-top: 1px solid #e4e4e4;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .message-input {
      height: 78px;
      border: none;
      outline: none;
      resize: none;
      padding: 13px 20px;
      font-size: 18px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #333;
    }

    .message-input::placeholder {
      color: #b8b8b8;
    }

    .tool-row {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
    }

    .tool {
      border: none;
      background: transparent;
      font-size: 31px;
      padding: 0;
      cursor: pointer;
      line-height: 1;
    }

    .send-btn {
      margin-left: auto;
      background: #1e88f5;
      color: #ffffff;
      border: none;
      border-radius: 7px;
      padding: 8px 17px;
      font-size: 20px;
      cursor: pointer;
    }

    .footer-text {
      height: 34px;
      text-align: center;
      color: #d6d6d6;
      font-size: 14px;
      line-height: 26px;
    }

    @media (max-width: 640px) {
      .chat-wrapper {
        max-width: none;
        border-left: none;
        border-right: none;
      }

      .service-message {
        width: calc(100vw - 92px);
        max-width: 390px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-wrapper">
    <div class="topbar">
      <div class="back">‹</div>
      <div class="icon">💬</div>
      <div class="top-title">在线客服</div>
    </div>

    <div class="chat-main" id="chatMain">
      <div class="service-info">
        <div class="avatar">👩🏻‍💼</div>
        <div class="name">客服</div>
        <div class="time">17:43:36</div>
      </div>

      <div class="service-message">客服在线时间9:30-24:00（下班请留言，上班后第一时间回复）

温馨提示： 目前只有【1-8成品直登账号!】
虚拟手机号暂时没有呢!
请平台点击【仅退款】即可!

第一步：发对应app数字给客服
0、不要发敏感字
1、打雀 ❌
2、指🛩飞鸡
3、古哥 由管
4、脸输📚（FB）
5、iNs
6、🐔皮踢（GPT）
7、踢克掏可（TK）
8、WS</div>
    </div>

    <div class="input-panel">
      <textarea
        id="msgInput"
        class="message-input"
        placeholder="请输入文字 # 长按撤回·引用·复制"
      ></textarea>

      <div class="tool-row">
        <button class="tool">🙂</button>
        <button class="tool">📁</button>
        <button class="tool">🔊</button>
        <button class="send-btn" onclick="sendMsg()">发送</button>
      </div>

      <div class="footer-text">您也需要客服系统?</div>
    </div>
  </div>

  <script>
    function sendMsg() {
      const input = document.getElementById("msgInput");
      const main = document.getElementById("chatMain");
      const text = input.value.trim();

      if (!text) return;

      const row = document.createElement("div");
      row.className = "user-message";
      row.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;

      main.appendChild(row);
      input.value = "";
      main.scrollTop = main.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("msgInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    });
  </script>
</body>
</html>
