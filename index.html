<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线客服</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: #222;
    }

    .chat-page {
      width: 100%;
      max-width: 640px;
      height: 100vh;
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #e5e5e5;
      border-right: 1px solid #e5e5e5;
    }

    .chat-header {
      height: 64px;
      background: #1e88f5;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .back {
      font-size: 38px;
      line-height: 1;
      margin-right: 12px;
      font-weight: 300;
    }

    .chat-icon {
      font-size: 34px;
      margin-right: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
    }

    .chat-body {
      flex: 1;
      padding: 34px 18px 18px;
      overflow-y: auto;
      background: #fff;
    }

    .message-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .sender-line {
      font-size: 18px;
      color: #748093;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sender-name {
      font-weight: 500;
    }

    .time {
      font-size: 16px;
      color: #8a94a6;
    }

    .service-content {
      flex: 1;
    }

    .bubble {
      display: inline-block;
      background: #ededf0;
      color: #111;
      padding: 12px 14px;
      font-size: 20px;
      line-height: 1.55;
      max-width: 100%;
      white-space: pre-line;
    }

    .user-row {
      justify-content: flex-end;
    }

    .user-bubble {
      background: #1e88f5;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 18px;
      line-height: 1.5;
      max-width: 72%;
      word-break: break-word;
    }

    .input-area {
      height: 180px;
      border-top: 1px solid #e5e5e5;
      background: #fff;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .text-input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 14px 22px;
      font-size: 18px;
      color: #333;
      font-family: inherit;
    }

    .text-input::placeholder {
      color: #b8b8b8;
    }

    .input-tools {
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 16px 8px;
      gap: 26px;
    }

    .tool {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      font-size: 30px;
      cursor: pointer;
      padding: 0;
    }

    .send-btn {
      margin-left: auto;
      background: #1e88f5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 18px;
      cursor: pointer;
    }

    .send-btn:active {
      transform: scale(0.98);
    }

    .footer-tip {
      text-align: center;
      font-size: 13px;
      color: #d1d1d1;
      padding-bottom: 10px;
    }

    @media (max-width: 480px) {
      .chat-page {
        max-width: none;
      }

      .bubble {
        font-size: 17px;
      }

      .sender-line {
        font-size: 16px;
      }

      .time {
        font-size: 14px;
      }

      .input-area {
        height: 165px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-page">
    <header class="chat-header">
      <div class="back">‹</div>
      <div class="chat-icon">💬</div>
      <div class="title">在线客服</div>
    </header>

    <main class="chat-body" id="chatBody">
      <div class="message-row">
        <div class="avatar">👩🏻‍💼</div>

        <div class="service-content">
          <div class="sender-line">
            <span class="sender-name">客服</span>
            <span class="time">17:43:36</span>
          </div>

          <div class="bubble">客服在线时间9:30-24:00（下班请留言，上班后第一时间回复）

温馨提示：目前只有【1-8成品直登账号！】
虚拟手机号暂时没有呢！
请平台点击【仅退款】即可！

第一步：发对应app数字给客服
0、不要发敏感字
1、打雀 ❌
2、指✈️飞鸡
3、古哥 由管
4、脸输 🧩
5、INs
6、🐔皮踢
7、踢克掏可
8、WS</div>
        </div>
      </div>
    </main>

    <section class="input-area">
      <textarea
        id="messageInput"
        class="text-input"
        placeholder="请输入文字 # 长按撤回·引用·复制"
      ></textarea>

      <div class="input-tools">
        <button class="tool" type="button">🙂</button>
        <button class="tool" type="button">📁</button>
        <button class="tool" type="button">🔊</button>

        <button class="send-btn" type="button" onclick="sendMessage()">发送</button>
      </div>

      <div class="footer-tip">您也需要客服系统?</div>
    </section>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatBody = document.getElementById("chatBody");
      const text = input.value.trim();

      if (!text) return;

      const row = document.createElement("div");
      row.className = "message-row user-row";

      row.innerHTML = `
        <div class="user-bubble">${escapeHtml(text)}</div>
      `;

      chatBody.appendChild(row);
      input.value = "";
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
