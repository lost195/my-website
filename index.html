<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线客服</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f3f3f3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: #222;
    }

    .chat-page {
      width: 100%;
      max-width: 640px;
      height: 100vh;
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #e5e5e5;
      border-right: 1px solid #e5e5e5;
    }

    .chat-header {
      height: 64px;
      background: #1e88f5;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .back {
      font-size: 38px;
      line-height: 1;
      margin-right: 12px;
      font-weight: 300;
    }

    .chat-icon {
      font-size: 34px;
      margin-right: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 500;
    }

    .chat-body {
      flex: 1;
      padding: 34px 18px 18px;
      overflow-y: auto;
      background: #fff;
    }

    .service-top {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .sender {
      font-size: 18px;
      color: #718096;
      margin-right: 8px;
    }

    .time {
      font-size: 16px;
      color: #8b95a5;
    }

    .message-box {
      margin-left: 44px;
      display: inline-block;
      background: #ededf0;
      padding: 10px 8px;
      font-size: 20px;
      line-height: 1.42;
      color: #111;
      white-space: pre-line;
      max-width: 390px;
    }

    .user-message {
      display: flex;
      justify-content: flex-end;
      margin: 16px 0;
    }

    .user-bubble {
      background: #1e88f5;
      color: #fff;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 18px;
      max-width: 72%;
      word-break: break-word;
    }

    .input-area {
      height: 180px;
      border-top: 1px solid #e6e6e6;
      background: #fff;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      padding: 12px 22px;
      font-size: 18px;
      font-family: inherit;
      color: #333;
    }

    .input::placeholder {
      color: #b8b8b8;
    }

    .bottom-bar {
      height: 74px;
      display: flex;
      align-items: center;
      padding: 0 14px 10px;
      gap: 24px;
    }

    .tool {
      border: none;
      background: transparent;
      font-size: 30px;
      padding: 0;
      cursor: pointer;
    }

    .send {
      margin-left: auto;
      background: #1e88f5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 18px;
      cursor: pointer;
    }

    .send:active {
      transform: scale(0.97);
    }

    .footer-tip {
      text-align: center;
      font-size: 13px;
      color: #d3d3d3;
      padding-bottom: 10px;
    }

    @media (max-width: 480px) {
      .chat-page {
        max-width: none;
      }

      .message-box {
        max-width: 390px;
        font-size: 18px;
        margin-left: 44px;
      }

      .sender {
        font-size: 17px;
      }

      .time {
        font-size: 15px;
      }

      .input-area {
        height: 170px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-page">
    <header class="chat-header">
      <div class="back">‹</div>
      <div class="chat-icon">💬</div>
      <div class="title">在线客服</div>
    </header>

    <main class="chat-body" id="chatBody">
      <div class="service-top">
        <div class="avatar">👩🏻‍💼</div>
        <div class="sender">客服</div>
        <div class="time">17:43:36</div>
      </div>

      <div class="message-box">客服在线时间9:30-24:00（下班请留言，上班后第一时间回复）

温馨提示：请在此输入您的问题，客服看到后会尽快回复。

请选择您需要咨询的类型：
1、商品咨询
2、订单问题
3、售后服务
4、退款问题
5、账号问题
6、其他问题</div>
    </main>

    <section class="input-area">
      <textarea
        id="messageInput"
        class="input"
        placeholder="请输入文字 # 长按撤回·引用·复制"
      ></textarea>

      <div class="bottom-bar">
        <button class="tool" type="button">🙂</button>
        <button class="tool" type="button">📁</button>
        <button class="tool" type="button">🔊</button>

        <button class="send" type="button" onclick="sendMessage()">发送</button>
      </div>

      <div class="footer-tip">您也需要客服系统?</div>
    </section>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatBody = document.getElementById("chatBody");
      const text = input.value.trim();

      if (!text) return;

      const row = document.createElement("div");
      row.className = "user-message";
      row.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;

      chatBody.appendChild(row);
      input.value = "";
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
