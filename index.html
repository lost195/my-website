<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线客服</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f2f2f2;
      color: #000;
    }

    .chat-page {
      width: 100%;
      max-width: 640px;
      min-height: 100vh;
      margin: 0 auto;
      background: #ffffff;
      overflow: hidden;
    }

    .top-bar {
      height: 64px;
      background: #1e88f5;
      color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 14px;
    }

    .back {
      font-size: 40px;
      line-height: 1;
      margin-right: 12px;
      font-weight: 300;
    }

    .chat-icon {
      font-size: 35px;
      margin-right: 13px;
      line-height: 1;
    }

    .title {
      font-size: 23px;
      font-weight: 400;
    }

    .chat-content {
      padding: 36px 20px 80px 20px;
      background: #ffffff;
    }

    .service-line {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      font-size: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
    }

    .service-name {
      font-size: 22px;
      color: #76869a;
      font-weight: 500;
    }

    .message {
      margin-left: 38px;
      font-size: 22px;
      line-height: 1.55;
      color: #000000;
      white-space: pre-line;
    }

    .message b {
      font-weight: 700;
    }

    .red {
      color: #ff0000;
      font-weight: 700;
      cursor: pointer;
    }

    .link {
      color: #0645ad;
      text-decoration: underline;
      cursor: pointer;
    }

    .input-area {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 640px;
      background: #ffffff;
      border-top: 1px solid #e5e5e5;
      padding: 10px 14px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      height: 42px;
      border: 1px solid #dddddd;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }

    .input-area button {
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: 6px;
      background: #1e88f5;
      color: #ffffff;
      font-size: 17px;
      cursor: pointer;
    }

    .input-area button:active {
      transform: scale(0.98);
    }

    .user-message {
      margin: 18px 0 0 auto;
      max-width: 75%;
      background: #1e88f5;
      color: white;
      padding: 9px 13px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1.5;
      word-break: break-word;
    }

    .system-tip {
      margin-left: 38px;
      margin-top: 14px;
      color: #666;
      font-size: 16px;
    }

    @media (max-width: 640px) {
      .chat-page {
        max-width: none;
      }

      .top-bar {
        height: 64px;
      }

      .message {
        font-size: 21px;
        margin-left: 38px;
      }

      .service-name {
        font-size: 21px;
      }

      .input-area {
        max-width: none;
      }
    }

    @media (max-width: 420px) {
      .message {
        font-size: 19px;
        line-height: 1.55;
      }

      .chat-content {
        padding-left: 16px;
        padding-right: 16px;
      }

      .service-name {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-page">
    <div class="top-bar">
      <div class="back">‹</div>
      <div class="chat-icon">💬</div>
      <div class="title">在线客服</div>
    </div>

    <div class="chat-content" id="chatContent">
      <div class="service-line">
        <div class="avatar">👩🏻‍💼</div>
        <div class="service-name">客服</div>
      </div>

      <div class="message">客服在线时间 9:30–24:00

温馨提示： 目前只有【1-8 成品直登账号!】
虚拟手机号暂时没有呢!
第一步：

点击最下方<span class="red" onclick="openTawk()">联系人工客服</span>
发对应 app 数字给客服
1、打雀 ❌
2、指⌁飞鸡
3、古哥 由管
4、脸输📚（FB）
5、<span class="link">iNs</span>
6、🐔皮踢（GPT）
7、<span class="link">踢克掏可</span>（TK）
8、WS</div>

      <div class="system-tip">点击下方“联系人工客服”可打开真实客服聊天窗口。</div>
    </div>
  </div>

  <div class="input-area">
    <input id="messageInput" type="text" placeholder="请输入文字" />
    <button onclick="sendMessage()">发送</button>
    <button onclick="openTawk()">联系人工客服</button>
  </div>

  <!-- Tawk.to 真实客服系统 -->
  <script type="text/javascript">
    var Tawk_API = Tawk_API || {};
    var Tawk_LoadStart = new Date();

    (function () {
      var s1 = document.createElement("script");
      var s0 = document.getElementsByTagName("script")[0];

      s1.async = true;
      s1.src = "https://embed.tawk.to/6a05db1c1358261c34fe7c05/1jojdvqfr";
      s1.charset = "UTF-8";
      s1.setAttribute("crossorigin", "*");

      s0.parentNode.insertBefore(s1, s0);
    })();

    function openTawk() {
      if (window.Tawk_API && typeof window.Tawk_API.maximize === "function") {
        window.Tawk_API.maximize();
      } else {
        alert("客服系统正在加载中，请稍等几秒后再点击。");
      }
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatContent = document.getElementById("chatContent");
      const text = input.value.trim();

      if (!text) return;

      const msg = document.createElement("div");
      msg.className = "user-message";
      msg.textContent = text;

      chatContent.appendChild(msg);
      input.value = "";

      setTimeout(function () {
        openTawk();
      }, 300);
    }

    document.getElementById("messageInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
