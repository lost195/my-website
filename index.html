<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线客服</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #efefef;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 640px;
      height: 100vh;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .header {
      height: 64px;
      background: #1e88f5;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .back {
      font-size: 34px;
      margin-right: 12px;
      line-height: 1;
    }

    .header-icon {
      font-size: 28px;
      margin-right: 10px;
    }

    .header-title {
      font-size: 20px;
      font-weight: normal;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px 10px;
      background: #f5f5f5;
    }

    .agent-row {
      display: flex;
      align-items: center;
      margin-top: 14px;
      margin-bottom: 10px;
    }

    .agent-avatar {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-right: 8px;
    }

    .agent-name {
      color: #6d7e93;
      font-size: 18px;
      margin-right: 12px;
      font-weight: 600;
    }

    .agent-time {
      color: #7c8b9d;
      font-size: 17px;
    }

    .msg-left-wrap {
      margin-left: 40px;
      margin-bottom: 18px;
    }

    .msg-left {
      display: inline-block;
      background: #e9e9eb;
      color: #222;
      font-size: 18px;
      line-height: 1.5;
      padding: 10px 10px;
      max-width: 390px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-right-wrap {
      display: flex;
      justify-content: flex-end;
      margin: 12px 0;
    }

    .msg-right {
      background: #1e88f5;
      color: #fff;
      font-size: 18px;
      line-height: 1.5;
      padding: 10px 14px;
      border-radius: 8px;
      max-width: 72%;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .input-panel {
      background: #f8f8f8;
      border-top: 1px solid #dfdfdf;
      flex-shrink: 0;
    }

    .input-box {
      width: 100%;
      height: 86px;
      border: none;
      outline: none;
      resize: none;
      background: #f8f8f8;
      padding: 16px 18px 8px;
      font-size: 17px;
      color: #333;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    .input-box::placeholder {
      color: #bdbdbd;
    }

    .toolbar {
      height: 74px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
    }

    .tool-btn {
      border: none;
      background: transparent;
      font-size: 34px;
      cursor: pointer;
      line-height: 1;
    }

    .send-btn {
      margin-left: auto;
      border: none;
      background: #1e88f5;
      color: #fff;
      font-size: 18px;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }

    .bottom-tip {
      text-align: center;
      color: #d6d6d6;
      font-size: 13px;
      padding-bottom: 10px;
    }

    .open-real-chat {
      color: #9ca3af;
      text-decoration: underline;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .app {
        max-width: 100%;
        border: none;
      }

      .msg-left {
        max-width: calc(100vw - 90px);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="back">‹</div>
      <div class="header-icon">💬</div>
      <div class="header-title">在线客服</div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="agent-row">
        <div class="agent-avatar">👩🏻‍💼</div>
        <div class="agent-name">客服</div>
        <div class="agent-time">17:43:36</div>
      </div>

      <div class="msg-left-wrap">
        <div class="msg-left">客服在线时间9:30-24:00（下班请留言，上班后第一时间回复）

温馨提示： 目前只有【1-8成品直登账号!】
虚拟手机号暂时没有呢!

第一步：发对应app数字给客服
0、不要发敏感字
1、打雀 ❌
2、指✈飞鸡
3、古哥 由管
4、脸输📚（FB）
5、iNs
6、🐔皮踢（GPT）
7、踢克掏可（TK）
8、WS</div>
      </div>
    </div>

    <div class="input-panel">
      <textarea
        id="messageInput"
        class="input-box"
        placeholder="请输入文字 # 长按撤回·引用·复制"
      ></textarea>

      <div class="toolbar">
        <button class="tool-btn" type="button">🙂</button>
        <button class="tool-btn" type="button">📁</button>
        <button class="tool-btn" type="button">🔊</button>
        <button class="send-btn" onclick="sendMessage()">发送</button>
      </div>

      <div class="bottom-tip">
        您也需要客服系统?
        <span class="open-real-chat" onclick="openTawk()">联系人工客服</span>
      </div>
    </div>
  </div>

  <!-- Tawk.to 真实客服系统开始 -->
  <script type="text/javascript">
    var Tawk_API = Tawk_API || {};
    var Tawk_LoadStart = new Date();

    (function () {
      var s1 = document.createElement("script");
      var s0 = document.getElementsByTagName("script")[0];

      s1.async = true;
      s1.src = "https://embed.tawk.to/6a05db1c1358261c34fe7c05/1jojdvqfr";
      s1.charset = "UTF-8";
      s1.setAttribute("crossorigin", "*");

      s0.parentNode.insertBefore(s1, s0);
    })();
  </script>
  <!-- Tawk.to 真实客服系统结束 -->

  <script>
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatArea = document.getElementById("chatArea");
      const text = input.value.trim();

      if (!text) return;

      const wrap = document.createElement("div");
      wrap.className = "msg-right-wrap";

      const bubble = document.createElement("div");
      bubble.className = "msg-right";
      bubble.textContent = text;

      wrap.appendChild(bubble);
      chatArea.appendChild(wrap);

      input.value = "";
      chatArea.scrollTop = chatArea.scrollHeight;

      setTimeout(function () {
        const replyWrap = document.createElement("div");
        replyWrap.className = "msg-left-wrap";

        replyWrap.innerHTML = `
          <div class="msg-left">已收到您的消息，请点击右下角真实客服窗口继续沟通。</div>
        `;

        chatArea.appendChild(replyWrap);
        chatArea.scrollTop = chatArea.scrollHeight;

        openTawk();
      }, 500);
    }

    function openTawk() {
      if (window.Tawk_API && typeof window.Tawk_API.maximize === "function") {
        window.Tawk_API.maximize();
      } else {
        alert("客服系统正在加载中，请稍等几秒后再点击。");
      }
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
